<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <!--
    WebView2 宿主进程已通过 SetProcessDpiAwarenessContext(DPI_AWARENESS_CONTEXT_PER_MONITOR_AWARE_V2)
    声明 Per-Monitor V2 DPI 感知，WebView2 自动使用逻辑 CSS px 渲染，无需 viewport scale。
  -->
  <title>MCPerfLimiter</title>
</head>
<body>
  <div id="app">

    <!-- ── 自制标题栏 ─────────────────────────────────────────────── -->
    <div id="titlebar" class="titlebar">

      <!-- Logo + 应用名（no-drag） -->
      <div class="titlebar-logo">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="14" height="14" rx="2.5" fill="var(--accent)"/>
          <text x="8" y="11.5" text-anchor="middle" font-size="7.5"
                font-weight="bold" fill="white" font-family="Consolas,monospace">MC</text>
        </svg>
        <span class="titlebar-title">MCPerfLimiter</span>
      </div>

      <!-- 中间拖拽区 -->
      <div class="titlebar-drag"></div>

      <!-- 窗口控制按钮（no-drag） -->
      <div class="titlebar-controls">
        <!-- GitHub 链接 -->
        <button class="wc-btn wc-btn--github" id="btn-github" title="GitHub 项目主页">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                     0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                     -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                     .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                     -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
                     1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
                     1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
                     1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </button>
        <!-- 主题切换 -->
        <button class="wc-btn wc-btn--theme" id="btn-theme" title="切换主题">
          <svg id="icon-theme" width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M8 2a6 6 0 100 12A6 6 0 008 2zm0 1v10a5 5 0 010-10z"
                  fill="currentColor"/>
          </svg>
        </button>
        <!-- 最小化 -->
        <button class="wc-btn" id="btn-minimize" title="最小化">
          <svg width="10" height="1" viewBox="0 0 10 1">
            <rect width="10" height="1" fill="currentColor"/>
          </svg>
        </button>
        <!-- 最大化 / 还原 -->
        <button class="wc-btn" id="btn-maximize" title="最大化">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <rect x="0.5" y="0.5" width="9" height="9" stroke="currentColor"/>
          </svg>
        </button>
        <!-- 关闭 -->
        <button class="wc-btn wc-btn--close" id="btn-close" title="关闭">
          <svg width="10" height="10" viewBox="0 0 10 10">
            <line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/>
            <line x1="10" y1="0" x2="0"  y2="10" stroke="currentColor" stroke-width="1.2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── 主体布局 ──────────────────────────────────────────────── -->
    <div class="layout">

      <!-- 侧边栏：进程列表 -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">进程列表</div>
          <div id="process-list" class="process-list">
            <div class="process-empty">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="opacity:.4">
                <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.3"/>
                <line x1="9.5" y1="9.5" x2="13.5" y2="13.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              <span>正在扫描...</span>
            </div>
          </div>
        </div>
        <div class="sidebar-bottom">
          <button class="sidebar-refresh-btn" id="btn-refresh">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 8a6 6 0 01-10.9 3.4M2 8a6 6 0 0110.9-3.4"/>
              <path d="M14 3v5h-5M2 13V8h5"/>
            </svg>
            刷新
          </button>
        </div>
      </aside>

      <!-- 侧边栏 resize 手柄 -->
      <div class="sidebar-resizer" id="sidebar-resizer"></div>

      <!-- 主内容区 -->
      <main class="main-content" id="main-content">
        <div class="no-selection">
          <div class="no-selection-icon">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="opacity:.25">
              <rect x="4" y="10" width="32" height="24" rx="4" stroke="currentColor" stroke-width="2"/>
              <path d="M14 22h12M20 18v8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="20" cy="6" r="2" fill="currentColor" opacity=".5"/>
            </svg>
          </div>
          <div class="no-selection-text">请从左侧选择一个 Minecraft 进程</div>
          <div class="no-selection-hint">未检测到进程时，请点击刷新重新扫描</div>
        </div>
      </main>
    </div>

    <!-- ── 状态栏 ─────────────────────────────────────────────────── -->
    <div class="statusbar" id="statusbar">
      <span class="statusbar-item" id="status-scan">就绪</span>
      <span class="statusbar-spacer"></span>
      <span class="statusbar-item" id="status-count">0 个进程</span>
    </div>

  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
